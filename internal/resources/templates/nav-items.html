{{define "nav-items"}}
    {{range .Children}}
        <div class="nav-item {{if .IsDir}}directory{{end}} {{if .IsActive}}active{{end}} {{if .IsAlwaysOpen}}open{{end}}">
            <a href="{{.Path}}">
                {{.Title}}
                {{/* Show arrow if this item is a directory and has children */}}
                {{if and .IsDir (gt (len .Children) 0)}}<span class="nav-arrow" aria-hidden="true"></span>{{end}}
            </a>
            {{if and .IsDir .Children (or .IsActive .IsAlwaysOpen)}}
                <div class="nav-children" style="padding-left: 16px;">
                    {{template "nav-items" .}}
                </div>
            {{end}}
        </div>
    {{end}}
{{end}}
